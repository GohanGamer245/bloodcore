<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCFA Store - Minecraft Full Access</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* GLOBAL FADE-IN */
* {
    animation: fadeIn 1s ease-in-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
header {
    background: linear-gradient(90deg, #4b0000, #800000);
    padding: 30px;
    text-align: center;
    font-size: 36px;
    font-weight: bold;
    animation: glowRed 2s infinite alternate;
}

/* NAVBAR */
nav {
    background: #1a1a1a;
    padding: 15px 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 18px;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 15px;
    border-radius: 5px;
    transition: 0.3s;
}

nav a:hover {
    background: #4b0000;
    animation: glowRed 1s infinite alternate;
}

/* MAIN */
main {
    padding: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60vh;
}

/* PRODUCT CARD */
.product {
    background: linear-gradient(145deg, #4b0000, #800000);
    padding: 50px;
    padding-bottom: 100px;
    border-radius: 15px;
    text-align: center;
    position: relative;
    transition: transform 0.3s, box-shadow 0.3s;
    max-width: 500px;
    width: 100%;
    cursor: pointer;
}

.product:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #800000;
}

/* PRODUCT TITLE */
.product h3 {
    margin: 0 0 20px 0;
    font-size: 32px;
    color: #fff;
    animation: glowRed 1.5s infinite alternate;
}

/* STOCK */
.in-stock {
    color: #00ff88;
    font-weight: bold;
    font-size: 26px;
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
}

/* PRICE */
.price, .new-price {
    font-weight: bold;
    font-size: 28px;
}

.price {
    color: #ffaaaa;
    text-decoration: line-through;
}

.new-price {
    color: #ffd700;
    animation: glowGold 1.5s infinite alternate;
}

/* BUY NOW BUTTON */
.buy-now {
    background: #000;
    color: #ff2e2e;
    border: none;
    padding: 14px 35px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;

    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    transition: 0.3s;
}

.buy-now:hover {
    background: #111;
    color: #fff;
    box-shadow: 0 0 15px #ff0000;
}

/* FOOTER */
footer {
    background:#1a1a1a;
    text-align:center;
    padding:20px;
    font-size:16px;
    color:#aaa;
}

/* ANIMATIONS */
@keyframes glowRed {
    from { text-shadow: 0 0 5px #ff0000; }
    to { text-shadow: 0 0 20px #ff0000; }
}

@keyframes glowGold {
    from { text-shadow: 0 0 5px #ffd700; }
    to { text-shadow: 0 0 25px #ffd700; }
}
</style>

</head>
<body>

<header>🌿 MCFA</header>

<nav>
    <a href="index.html">Home</a>
    <a href="payment.html">Payment Methods</a>
    <a href="support.html">Support</a>
    <a href="checkout.html">Checkout</a>
</nav>

<main>
    <div class="product">
        <h3>Minecraft Full Access</h3>
        <p class="in-stock">✔ Currently in Stock</p>
        <p>
            <span class="price">$9.99</span> 
            <span class="new-price">$4.99</span>
        </p>
        <button class="buy-now" onclick="buyNow()">Buy Now</button>
    </div>
</main>

<footer>
    &copy; 2026 BloodCore Store. All Rights Reserved.
</footer>

<script>
function buyNow() {
    alert("Make a ticket in Discord for buying!");
    window.location.href = "https://discord.gg/S3qQHVmH";
}
</script>

</body>
</html>
