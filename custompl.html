<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Nitro IDs - BloodCore</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #fff;
}

/* GLOBAL TEXT ANIMATION */
* {
    animation: fadeIn 1s ease-in-out;
}

/* Fade Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Header */
header {
    background: linear-gradient(90deg, #4b0000, #800000);
    padding: 30px;
    text-align: center;
    font-size: 34px;
    font-weight: bold;
    animation: glowRed 2s infinite alternate;
}

/* Navbar */
nav {
    background: #1a1a1a;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

nav a {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    padding: 8px 15px;
    border-radius: 5px;
    transition: 0.3s;
}

nav a:hover {
    background: #4b0000;
    animation: glowRed 1s infinite alternate;
}

/* Main */
main {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 70vh;
}

/* Product Card */
.product {
    background: linear-gradient(145deg, #4b0000, #800000);
    padding: 50px;
    border-radius: 15px;
    text-align: center;
    max-width: 450px;
    width: 100%;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #800000;
}

/* Title Glow */
.product h2 {
    font-size: 30px;
    margin-bottom: 20px;
    animation: glowRed 2s infinite alternate;
}

/* Stock Glow */
.stock {
    color: #00ff88;
    font-weight: bold;
    font-size: 22px;
    margin-bottom: 15px;
    animation: glowGreen 1.5s infinite alternate;
}

/* Price Glow */
.price {
    font-size: 28px;
    font-weight: bold;
    color: #ffd700;
    animation: glowGold 1.5s infinite alternate;
}

/* Glow Animations */
@keyframes glowRed {
    from { text-shadow: 0 0 5px #ff0000; }
    to { text-shadow: 0 0 20px #ff0000; }
}

@keyframes glowGreen {
    from { text-shadow: 0 0 5px #00ff88; }
    to { text-shadow: 0 0 20px #00ff88; }
}

@keyframes glowGold {
    from { text-shadow: 0 0 5px #ffd700; }
    to { text-shadow: 0 0 25px #ffd700; }
}

/* Button */
.buy-btn {
    margin-top: 25px;
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    border: 2px solid #800000;
    background: #0b0b0b;
    color: #ff2e2e;
    cursor: pointer;
    transition: 0.3s;
}

.buy-btn:hover {
    background: #800000;
    color: #fff;
    animation: glowRed 1s infinite alternate;
}

/* Footer */
footer {
    background:#1a1a1a;
    text-align:center;
    padding:20px;
    color:#aaa;
    animation: fadeIn 2s ease-in-out;
}
</style>

</head>
<body>

<header>💎Custom Plugin</header>

<nav>
    <a href="index.html">Home</a>
    <a href="payment.html">Payment Methods</a>
    <a href="support.html">Support</a>
</nav>

<main>
    <div class="product">
        <h2>Custom Plugin</h2>
        <p class="stock">✔ Currently in Stock</p>
        <p class="price">$7 / 2000 PKR</p>
        <button class="buy-btn" onclick="buyNow()">Buy Now</button>
    </div>
</main>

<footer>
    &copy; 2026 BloodCore Store. All Rights Reserved.
</footer>

<script>
function buyNow() {
    alert("Make a ticket in Discord for buying!");
    window.location.href = "https://discord.gg/S3qQHVmH";
}
</script>

</body>
</html>
