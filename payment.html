<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Methods - BloodCore</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    overflow-x: hidden;
    animation: backgroundPulse 10s infinite alternate;
}

/* Background Animation */
@keyframes backgroundPulse {
    0% { background-color: #0b0b0b; }
    50% { background-color: #1a0000; }
    100% { background-color: #0b0b0b; }
}

/* Header */
header {
    background: linear-gradient(90deg, #8b0000, #000);
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    animation: slideDown 1s ease-out;
}

/* Header Slide Animation */
@keyframes slideDown {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

/* Back Button */
.back-button {
    display: inline-block;
    margin: 20px;
    padding: 10px 16px;
    background-color: #8b0000;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
    animation: fadeIn 1s ease forwards;
}

.back-button:hover {
    background-color: #ff2e2e;
    box-shadow: 0 0 15px #ff2e2e;
}

/* Container */
.container {
    padding: 40px;
}

/* Section Headings */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ff2e2e;
    font-size: 28px;
    animation: textGlow 2s infinite alternate;
}

/* Grid Layout */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    margin-top: 20px;
}

/* Cards */
.card {
    background: #111;
    border: 1px solid #8b0000;
    border-radius: 14px;
    text-align: center;
    transition: all 0.3s ease;
    cursor: pointer;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.8s forwards;
}

/* Fade in each card with delay */
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.5s; }
.card:nth-child(6) { animation-delay: 0.6s; }
.card:nth-child(7) { animation-delay: 0.7s; }
.card:nth-child(8) { animation-delay: 0.8s; }
.card:nth-child(9) { animation-delay: 0.9s; }
.card:nth-child(10) { animation-delay: 1s; }

/* Card Hover Effect */
.card:hover {
    background: #8b0000;
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,0,0,0.6);
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes textGlow {
    0% { text-shadow: 0 0 5px #ff2e2e; }
    50% { text-shadow: 0 0 20px #ff2e2e, 0 0 30px #ff0000; }
    100% { text-shadow: 0 0 5px #ff2e2e; }
}
</style>
</head>
<body>

<header>💳 Payment Methods</header>

<!-- Back Button -->
<a href="index.html" class="back-button">← Back to Home</a>

<div class="container">

<!-- Pakistani Payment Methods -->
<div class="section">
<h2>🇵🇰 Pakistani Payment Methods</h2>
<div class="grid">
<div class="card">EasyPaisa</div>
<div class="card">JazzCash</div>
<div class="card">NayaPay</div>
<div class="card">Bank Transfer</div>
<div class="card">SadaPay</div>
</div>
</div>

<!-- Indian Payment Methods -->
<div class="section">
<h2>🇮🇳 Indian Payment Methods</h2>
<div class="grid">
<div class="card">Fampay</div>
<div class="card">UPI</div>
<div class="card">PayTM</div>
</div>
</div>

</div>
</body>
</html>
