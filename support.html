<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - BloodCore</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
    emailjs.init("kLHwJvkxsj6PH_bQS");
})();
</script>

<style>
/* BODY & BACKGROUND ANIMATION */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    overflow-x: hidden;
    animation: backgroundPulse 10s infinite alternate;
}

/* Background pulse */
@keyframes backgroundPulse {
    0% { background-color: #0b0b0b; }
    50% { background-color: #1a0000; }
    100% { background-color: #0b0b0b; }
}

/* FADE IN */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* HEADER */
header {
    background: linear-gradient(90deg, #8b0000, #000);
    padding: 20px;
    text-align: center;
    font-size: 28px;
    animation: slideDown 1s ease-out, glowRed 2s infinite alternate;
}

/* Header slide down */
@keyframes slideDown {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}

/* NAVIGATION */
nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: #111;
    padding: 10px;
    animation: fadeIn 1.2s ease forwards;
}

nav a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #ff2e2e;
    text-shadow: 0 0 10px red;
}

/* SECTION */
.section {
    padding: 40px;
    text-align: center;
}

/* HEADING */
h1 {
    color: #ff2e2e;
    font-size: 32px;
    animation: glowRed 2s infinite alternate, fadeIn 1s ease forwards;
}

/* SUPPORT BOX */
.support-box {
    background: #111;
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
    border: 1px solid #8b0000;
    animation: slideUp 0.8s ease forwards;
    transform: translateY(30px);
    opacity: 0;
}

/* Slide up animation */
@keyframes slideUp {
    to { transform: translateY(0); opacity: 1; }
}

/* INPUTS */
input, textarea {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
    background: #222;
    color: white;
    transition: 0.3s;
}

/* Input glow on focus */
input:focus, textarea:focus {
    outline: none;
    box-shadow: 0 0 10px #ff0000;
}

/* BUTTONS */
button, .btn {
    background: #8b0000;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover, .btn:hover {
    background: #5C0000;
    box-shadow: 0 0 15px red;
    transform: scale(1.05);
}

/* FOOTER */
footer {
    margin-top: 40px;
    padding: 30px;
    background: #000;
    color: #aaa;
    text-align: center;
    animation: fadeIn 1.5s ease forwards;
}

/* GLOW ANIMATION */
@keyframes glowRed {
    0% { text-shadow: 0 0 5px #ff2e2e; }
    50% { text-shadow: 0 0 20px #ff2e2e, 0 0 30px #ff0000; }
    100% { text-shadow: 0 0 5px #ff2e2e; }
}
</style>
</head>
<body>

<header>🩸 BloodCore Support</header>

<nav>
    <a href="index.html">Home</a>
    <a href="services.html">Shop</a>
    <a href="payment.html">Payment</a>
</nav>

<section class="section">
    <h1>Contact Support</h1>
    <p>Send us a message and we’ll reply to your email.</p>

    <div class="support-box">
        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="message" rows="5" placeholder="Your Message"></textarea>

        <button onclick="sendMessage()">Send Message</button>

        <p>or</p>

        <a href="https://discord.gg/eGHNMQ9MP8" target="_blank" class="btn">
            Join Discord Support
        </a>
    </div>
</section>

<footer>
    © 2026 BloodCore. All rights reserved.
</footer>

<script>
function sendMessage(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const message = document.getElementById("message").value.trim();

    if(!name || !email || !message){
        alert("Please fill all fields!");
        return;
    }

    emailjs.send("service_1xyhqmg", "template_dyleuoi", {
        from_name: name,
        from_email: email,
        message: message
    })
    .then(function(response) {
        alert("✅ Message Sent Successfully!");
    })
    .catch(function(error) {
        alert("❌ Failed to send message!");
        console.error(error);
    });
}
</script>

</body>
</html>
